kind = "web"
previewPath = "/"
title = "Catch Future — Puresar"
version = "1.0.0"
id = "artifacts/catch-future"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22152

[services.development]
run = "pnpm --filter @workspace/catch-future run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/catch-future", "run", "build" ]
publicDir = "artifacts/catch-future/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22152"
BASE_PATH = "/"
