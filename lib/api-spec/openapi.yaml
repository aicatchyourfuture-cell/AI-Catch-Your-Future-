openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: inquiries
    description: Customer inquiries and lookbook requests
  - name: admin
    description: Private admin / atelier endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /inquiries:
    post:
      operationId: createInquiry
      tags: [inquiries]
      summary: Submit a Puresar inquiry
      description: Records a contact / lookbook / trade inquiry from the landing page.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInquiryBody"
      responses:
        "201":
          description: Inquiry recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Authenticate admin session
      description: Verifies the admin password and sets a signed session cookie.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: End admin session
      responses:
        "204":
          description: Logged out
  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Current admin session status
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/inquiries:
    get:
      operationId: listInquiries
      tags: [admin]
      summary: List all inquiries
      description: Returns every inquiry, newest first. Requires an admin session.
      responses:
        "200":
          description: Inquiry list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryList"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    InquiryType:
      type: string
      enum:
        - lookbook
        - trade
        - general
    CreateInquiryBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 320
        inquiryType:
          $ref: "#/components/schemas/InquiryType"
        message:
          type: string
          minLength: 1
          maxLength: 4000
      required:
        - name
        - email
        - inquiryType
        - message
    Inquiry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        inquiryType:
          $ref: "#/components/schemas/InquiryType"
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - inquiryType
        - message
        - createdAt
    InquiryList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Inquiry"
      required:
        - items
    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
          minLength: 1
      required:
        - password
    AdminSession:
      type: object
      properties:
        authenticated:
          type: boolean
      required:
        - authenticated
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
